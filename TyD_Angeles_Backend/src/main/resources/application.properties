spring.application.name=TyD_Angeles_Backend
# ══════════════════════════════════════════════════════════════
#  KIT PREPAGO - TyD Angeles
#  application.properties — Configuración base (DEV)
#  Para producción crear application-prod.properties y sobreescribir
# ══════════════════════════════════════════════════════════════

# ── Servidor ──────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# ── Base de datos ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/db_tyg?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones (HikariCP viene con Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
# IMPORTANTE: En DEV usar 'validate' (no 'create' ni 'update').
# El schema ya está creado con los scripts SQL.
# 'validate' verifica que las entidades coincidan con la BD al arrancar.

spring.jpa.show-sql=true
logging.level.org.hibernate.orm.results=TRACE
# En dev puedes poner true para ver las queries, pero NUNCA en prod
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Lima
spring.jpa.open-in-view=false
# open-in-view=false es importante: evita el anti-patrón de lazy loading
# en la capa de presentación (el session se cierra al salir del service)

# ── JWT ───────────────────────────────────────────────────────
# IMPORTANTE: Generar con: openssl rand -base64 64
# Debe tener al menos 512 bits (64 bytes en base64 = ~88 chars)
app.jwt.secret=WOGi/Tv/PKHToqzio2ju0sQJWWG8ihLJBOs4o4MBcS5GYBM7jMO/qWYmaxzz5ry3nopaceOkx6v2V/VdA6b4Fw==
app.jwt.expiration-ms=86400000
# 86400000 ms = 24 horas (token de acceso)
app.jwt.refresh-expiration-ms=604800000
# 604800000 ms = 7 días (refresh token)

# ── Seguridad (bloqueo por intentos fallidos) ─────────────────
app.security.max-intentos-fallidos=5
app.security.bloqueo-minutos=15
# Después de 5 intentos fallidos, la cuenta se bloquea 15 minutos

# ── Zona horaria ──────────────────────────────────────────────
spring.jackson.time-zone=America/Lima
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Upload de archivos (si se agrega subida de imágenes después) ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ───────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.tyd.kitprepago=DEBUG
logging.level.org.springframework.security=INFO
# En prod cambiar com.tyd.kitprepago a WARN

# ── Actuator (health check para el servidor) ──────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

