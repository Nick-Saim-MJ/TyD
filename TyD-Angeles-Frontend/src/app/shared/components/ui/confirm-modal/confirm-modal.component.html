@if (modal.state().visible) {
  <div class="modal-backdrop" (click)="onBackdropClick($event)">
    <div class="modal-card" role="dialog" aria-modal="true"
         [attr.aria-labelledby]="'modal-titulo'">

      <!-- Icono según tipo -->
      <div class="modal-icon" [attr.data-tipo]="modal.state().tipo">
        @if (modal.state().tipo === 'danger') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71
                c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898
                0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
          </svg>
        } @else if (modal.state().tipo === 'warning') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025
                1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45
                1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75
                0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/>
          </svg>
        }
      </div>

      <h3 id="modal-titulo" class="modal-titulo">{{ modal.state().titulo }}</h3>
      <p class="modal-mensaje">{{ modal.state().mensaje }}</p>

      <div class="modal-actions">
        <button class="btn-cancelar" (click)="cancelar()">
          {{ modal.state().labelCancelar }}
        </button>
        <button class="btn-confirmar" [attr.data-tipo]="modal.state().tipo"
                (click)="confirmar()">
          {{ modal.state().labelConfirmar }}
        </button>
      </div>

    </div>
  </div>
}
